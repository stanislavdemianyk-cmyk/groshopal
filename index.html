<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Грошопал — Meeting Burn Rate Calculator</title>

  <!-- Секція стилів: Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: {
            card: "0 20px 40px rgba(15, 23, 42, 0.22)",
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
  <!-- Секція розмітки: центрована картка калькулятора -->
  <main class="mx-auto flex min-h-screen w-full max-w-3xl items-center justify-center p-4 sm:p-6">
    <section class="w-full rounded-2xl border border-slate-800 bg-slate-900/85 p-5 shadow-card sm:p-8">
      <header class="mb-6 sm:mb-8">
        <p class="inline-block rounded-full border border-cyan-400/40 bg-cyan-400/10 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-cyan-300">
          Meeting Burn Rate Calculator
        </p>
        <h1 class="mt-3 text-3xl font-bold sm:text-4xl">Грошопал</h1>
        <p class="mt-2 text-sm text-slate-400 sm:text-base">
          Калькулятор вартості зустрічі в реальному часі.
        </p>
      </header>

      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
        <label class="block">
          <span class="mb-2 block text-sm font-medium text-slate-300">Кількість учасників</span>
          <input
            id="participants"
            type="number"
            min="1"
            step="1"
            value="5"
            class="w-full rounded-xl border border-slate-700 bg-slate-800 px-4 py-3 text-base text-slate-100 outline-none transition focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/30"
          />
        </label>

        <label class="block">
          <span class="mb-2 block text-sm font-medium text-slate-300">Середня годинна ставка ($)</span>
          <input
            id="hourlyRate"
            type="number"
            min="0.01"
            step="0.01"
            value="50"
            class="w-full rounded-xl border border-slate-700 bg-slate-800 px-4 py-3 text-base text-slate-100 outline-none transition focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/30"
          />
        </label>

        <label class="block">
          <span class="mb-2 block text-sm font-medium text-slate-300">Валюта</span>
          <select
            id="currency"
            class="w-full rounded-xl border border-slate-700 bg-slate-800 px-4 py-3 text-base text-slate-100 outline-none transition focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/30"
          >
            <option value="USD">USD ($)</option>
            <option value="EUR">EUR (€)</option>
            <option value="UAH">UAH (₴)</option>
          </select>
        </label>
      </div>

      <div class="mt-6 rounded-2xl border border-slate-800 bg-slate-950/60 p-5 text-center sm:p-7">
        <p class="text-xs uppercase tracking-[0.16em] text-slate-400">Тривалість зустрічі</p>
        <p id="duration" class="mt-2 text-4xl font-bold text-slate-100 sm:text-5xl">00:00:00</p>

        <p class="mt-6 text-xs uppercase tracking-[0.16em] text-slate-400">Згоріло</p>
        <p id="burnedAmount" class="mt-2 text-5xl font-extrabold text-orange-400 sm:text-6xl">$0.00</p>
      </div>

      <div class="mt-6 grid grid-cols-1 gap-3 sm:grid-cols-2">
        <button
          id="toggleBtn"
          class="w-full rounded-xl bg-blue-500 px-5 py-3 text-lg font-semibold text-slate-50 transition hover:bg-blue-400 disabled:cursor-not-allowed disabled:opacity-50"
        >
          Старт
        </button>
        <button
          id="resetBtn"
          class="w-full rounded-xl bg-slate-700 px-5 py-3 text-lg font-semibold text-slate-100 transition hover:bg-slate-600"
        >
          Скинути
        </button>
      </div>
    </section>
  </main>

  <!-- Секція логіки: таймер, валідація та розрахунок -->
  <script>
    const participantsInput = document.getElementById("participants");
    const hourlyRateInput = document.getElementById("hourlyRate");
    const currencySelect = document.getElementById("currency");
    const durationEl = document.getElementById("duration");
    const burnedAmountEl = document.getElementById("burnedAmount");
    const toggleBtn = document.getElementById("toggleBtn");
    const resetBtn = document.getElementById("resetBtn");

    let isRunning = false;
    let elapsedSeconds = 0;
    let timerId = null;
    const STORAGE_KEY = "hroshopal_state_v1";

    const CURRENCIES = {
      USD: { symbol: "$", rate: 1 },
      EUR: { symbol: "€", rate: 1 },
      UAH: { symbol: "₴", rate: 1 },
    };

    function formatTime(totalSeconds) {
      const safe = Math.max(0, totalSeconds);
      const hours = Math.floor(safe / 3600);
      const minutes = Math.floor((safe % 3600) / 60);
      const seconds = safe % 60;
      return [hours, minutes, seconds].map((v) => String(v).padStart(2, "0")).join(":");
    }

    function calculateBurnedMoney(participants, hourlyRate, seconds) {
      const burnRatePerHour = participants * hourlyRate;
      const elapsedTimeInHours = seconds / 3600;
      return burnRatePerHour * elapsedTimeInHours;
    }

    function getParsedValues() {
      return {
        participants: Number(participantsInput.value),
        hourlyRate: Number(hourlyRateInput.value),
        currency: currencySelect.value,
      };
    }

    function isValidInput() {
      const { participants, hourlyRate } = getParsedValues();
      return Number.isFinite(participants) && participants >= 1 &&
             Number.isFinite(hourlyRate) && hourlyRate > 0;
    }

    function saveState(burnedMoneyInCurrency) {
      const { participants, hourlyRate, currency } = getParsedValues();
      const state = {
        participants,
        hourlyRate,
        currency,
        elapsedSeconds,
        burnedMoney: burnedMoneyInCurrency,
        isRunning,
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function restoreState() {
      const rawState = localStorage.getItem(STORAGE_KEY);
      if (!rawState) return;

      try {
        const saved = JSON.parse(rawState);

        if (Number.isFinite(saved.participants)) {
          participantsInput.value = saved.participants;
        }
        if (Number.isFinite(saved.hourlyRate)) {
          hourlyRateInput.value = saved.hourlyRate;
        }
        if (saved.currency && CURRENCIES[saved.currency]) {
          currencySelect.value = saved.currency;
        }
        if (Number.isFinite(saved.elapsedSeconds) && saved.elapsedSeconds >= 0) {
          elapsedSeconds = saved.elapsedSeconds;
        }
        if (saved.isRunning === true) {
          isRunning = true;
        }

        console.log("DEBUG: Timer state restored from storage");
      } catch (error) {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function render() {
      const valid = isValidInput();
      const { participants, hourlyRate, currency } = getParsedValues();
      const currencyConfig = CURRENCIES[currency] || CURRENCIES.USD;

      const burnedMoney = valid
        ? calculateBurnedMoney(participants, hourlyRate, elapsedSeconds)
        : 0;
      const burnedMoneyInCurrency = burnedMoney * currencyConfig.rate;

      durationEl.textContent = formatTime(elapsedSeconds);
      burnedAmountEl.textContent = `${currencyConfig.symbol}${burnedMoneyInCurrency.toFixed(2)}`;

      burnedAmountEl.classList.toggle("text-red-500", burnedMoneyInCurrency > 50);
      burnedAmountEl.classList.toggle("text-orange-400", burnedMoneyInCurrency <= 50);
      burnedAmountEl.classList.toggle("animate-pulse", burnedMoneyInCurrency > 100);

      toggleBtn.disabled = !valid && !isRunning;
      saveState(burnedMoneyInCurrency);
    }

    function startTimer() {
      if (!isValidInput()) return;
      isRunning = true;
      toggleBtn.textContent = "Стоп";
      toggleBtn.classList.remove("bg-blue-500", "hover:bg-blue-400", "text-slate-50");
      toggleBtn.classList.add("bg-red-500", "hover:bg-red-400", "text-white");

      if (timerId) {
        clearInterval(timerId);
      }
      timerId = setInterval(() => {
        elapsedSeconds += 1;
        render();
      }, 1000);
      render();
    }

    function stopTimer() {
      isRunning = false;
      toggleBtn.textContent = "Старт";
      toggleBtn.classList.remove("bg-red-500", "hover:bg-red-400", "text-white");
      toggleBtn.classList.add("bg-blue-500", "hover:bg-blue-400", "text-slate-50");

      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
      render();
    }

    function resetAll() {
      elapsedSeconds = 0;
      if (isRunning) {
        stopTimer();
      } else {
        render();
      }
      localStorage.removeItem(STORAGE_KEY);
    }

    toggleBtn.addEventListener("click", () => {
      if (isRunning) {
        stopTimer();
      } else {
        startTimer();
      }
    });

    resetBtn.addEventListener("click", resetAll);
    participantsInput.addEventListener("input", render);
    hourlyRateInput.addEventListener("input", render);
    currencySelect.addEventListener("change", render);

    restoreState();
    render();
    if (isRunning) {
      if (isValidInput()) {
        startTimer();
      } else {
        isRunning = false;
        render();
      }
    }
  </script>
</body>
</html>
